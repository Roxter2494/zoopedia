<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Enciclopedia de Zootecnia</title>

    <link rel="stylesheet" href="css/estilos.css">
    <meta name="theme-color" content="#0b1f14">

    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" href="icon-192.png">

</head>
<script>

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker.register("./service-worker.js")

        .then(()=>{

            console.log("PWA instalada correctamente");

        });

    });

}

</script>
<body>

    <!-- ================= LOADER ================= -->

    <div id="loader" class="loader oculto">
        <div class="spinner"></div>
        <p>Hola...</p>
    </div>

    <!-- ================= HEADER ================= -->

    <header id="topbar">

        <div class="logo">

            🐄

            <h1>Enciclopedia de Zootecnia</h1>

        </div>

    </header>

    <!-- ================= CONTENEDOR ================= -->

    <div id="app">

        <!-- ============ SIDEBAR ============ -->

        <aside id="sidebar">

            <div class="sidebar-header">

                <h2>Animales</h2>

            </div>

            <nav id="menuAnimales">

                <!-- Se genera desde datos.js -->

            </nav>

            <hr>

            <nav id="menuExtra">

                <button id="btnInicio">🏠 Inicio</button>

                <button id="btnInformacion">📖 Informacion</button>

                <button id="btnFAQ">❓ Preguntas frecuentes</button>

            </nav>

        </aside>

        <!-- ============ CONTENIDO ============ -->

        <main id="contenido">

            <!-- Breadcrumb -->

            <nav id="breadcrumb"></nav>

            <!-- Todo el contenido dinámico -->

            <section id="vista">

            </section>

        </main>

    </div>

    <!-- ================= BOTÓN ARRIBA ================= -->

    <button id="btnTop">

        ↑

    </button>

    <!-- ================= MODAL ================= -->

    <div id="modal" class="oculto">

        <div id="modalContenido"></div>

    </div>

    <!-- ================= TOAST ================= -->

    <div id="toast"></div>

    <!-- ================= SCRIPTS ================= -->

    <script src="js/datos.js"></script>

    <script src="js/preguntas.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
<link rel="manifest" href="manifest.json">
<script>
if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("./service-worker.js")
            .then(() => console.log("Service Worker registrado"))
            .catch(err => console.error(err));

    });

}
</script>
